name: CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  actions: read
  code-quality: write
  contents: read
  packages: read

jobs:
  validate:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 26
          - 24
          - 22
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: ⚙️ Setup
        uses: w5s/actions/setup@98605e3df950d447991cd12620b32493d96b7291 # main
        with:
          node-version: ${{ matrix.node-version }}
      - name: 🔨 Build
        uses: w5s/actions/task@98605e3df950d447991cd12620b32493d96b7291 # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@98605e3df950d447991cd12620b32493d96b7291 # main
        with:
          task: validate
