name: CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 24
          - 22
          - 20
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: ⚙️ Setup
        uses: w5s/actions/setup@67354fa9d5f33c0ecdfbdaf398cb73e019fa7844 # main
        with:
          node-version: ${{ matrix.node-version }}
      - name: 🔨 Build
        uses: w5s/actions/task@67354fa9d5f33c0ecdfbdaf398cb73e019fa7844 # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@67354fa9d5f33c0ecdfbdaf398cb73e019fa7844 # main
        with:
          task: validate
