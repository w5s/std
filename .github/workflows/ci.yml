name: CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  actions: read
  code-quality: write
  contents: read

jobs:
  build:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 26
          - 24
          - 22
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: ⚙️ Setup
        uses: w5s/actions/setup@90bf2df3a27e77244fb08b3a4501d9b6ba619d34 # main
        with:
          node-version: ${{ matrix.node-version }}
      - name: 🔨 Build
        uses: w5s/actions/task@90bf2df3a27e77244fb08b3a4501d9b6ba619d34 # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@90bf2df3a27e77244fb08b3a4501d9b6ba619d34 # main
        with:
          task: validate
