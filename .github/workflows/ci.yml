name: CI
on:
  merge_group: {}
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 24
          - 22
          - 20
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: ⚙️ Setup
        uses: w5s/actions/setup@d2b520090c0450c44d426be3ebe4a97e415a8598 # main
        with:
          node-version: ${{ matrix.node-version }}
      - name: 🔨 Build
        uses: w5s/actions/task@d2b520090c0450c44d426be3ebe4a97e415a8598 # main
        with:
          task: build
      - name: 🔍 Validate
        uses: w5s/actions/task@d2b520090c0450c44d426be3ebe4a97e415a8598 # main
        with:
          task: validate
